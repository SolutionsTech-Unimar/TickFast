<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style-tickfast.css') }}"
    />
    <!-- Trocar aqui pela referência do style-->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='fonts/CreatoDisplay-Bold.otf') }}"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=engineering,help,lists,notifications"
    />
    <!-- Trocar aqui pela referência da pasta da fonte-->
    <title>TickFast</title>
  </head>

  <body>
    <nav class="Testa">
      <h1 class="titulo">TickFast</h1>

      <div class="aero">
        <div style="display:flex">
          <div class="tab-hover-container">
            <a href="#" class="tab-hover header-button-calendario">Calendário</a>
            <a href="#" class="tab-hover header-button-mapa">Mapa</a>
          </div>

          <div class="background-notificacao">
            <span class="material-symbols-outlined notificacao">
              notifications
            </span>
          </div>
        </div>
      </div>
    </nav>

    <div id="mini-bar" class="mini-bar">
      <button id="btnPessoa" class="icon-button">
        <span class="material-symbols-outlined"> engineering </span>
      </button>
      <button id="btnCarta" class="icon-button">
        <span class="material-symbols-outlined"> lists </span>
      </button>
      <button id="btnHelp" class="help-icon">
        <span class="material-symbols-outlined"> help </span>
      </button>
    </div>

    <div class="calendar">
      <div class="conteiner">
        <div class="boxData">
          <h1>
            <span id="dia-atual" class="highlight"></span
            ><span id="mes-atual" class="highlight2"></span>
          </h1>
        </div>
        <div id="map">
          <div id="sidebarPessoa" class="sidebar">
            <button class="close-btn" onclick="closeSidebar('sidebarPessoa')">
              ✖
            </button>
            <h2>Técnicos</h2>
            <div class="ticket-box">
              <h3>Téc. Candito Mota</h3>
              <p>Especializado em Gás de geladeira</p>
              <p>
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYd8zCkDXyXoDYNJoYhHHNGS7ifXGik2cU4w&s"
                  alt=""
                />
              </p>
              <p></p>
            </div>
            <div class="ticket-box">
              <h3>Téc. Carlos Adalberto</h3>
              <p>Especializado em Chantilly</p>
              <p>
                <img
                  src="https://preview.redd.it/goofyist-nu-metal-band-my-vote-is-soad-v0-b73sog3nfcnc1.png?auto=webp&s=69f90fa868281df00a77bab7efc5c92567108482"
                />
              </p>
              <p></p>
            </div>
        
          </div>
          <div id="sidebarCarta" class="sidebar">
            <button class="close-btn" onclick="closeSidebar('sidebarCarta')">
              ✖
            </button>
            <h2>Tickets</h2>
          </div>
        </div>
        <div id='calendar' ></div>
      </div>
    </div>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/pt-br.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/locales-all.min.js"></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js'></script>

<script src="{{ url_for('static', filename='js/javinha.js') }}" defer></script>
<!-- Trocar aqui pela referência do javinha.js-->

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>
